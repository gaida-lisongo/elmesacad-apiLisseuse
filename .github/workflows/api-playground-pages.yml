# Déploie le contenu statique depuis docs/ vers GitHub Pages (source « GitHub Actions »).
#
# Si vous préférez « Deploy from a branch », ne lancez pas ce workflow :
# réglages → Pages → Deploy from branch → branche principale → dossier /docs
# Les fichiers servis sont ceux dans docs/ (dont index.html).
#
# Déclenchement : Actions → « API playground (Pages) » → Run workflow.

name: API playground (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: api-playground-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier la racine Pages
        run: |
          test -f docs/index.html || (echo 'docs/index.html manquant' && exit 1)
          test -f docs/.nojekyll || touch docs/.nojekyll

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
